name: Monthly YouTube Directory Sync

on:
  schedule:
    # ⏰ Cron schedule layout triggers automatically at 00:00 on every single sunday.
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to also trigger it manually with a single click in the GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the automated runner to commit data back to your repo

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install yt-dlp dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Run Scraper Update Script
      run: |
        # Change directory into scripts folder so relative paths match up
        cd scripts
        python generate_videos_json.py

    - name: Check for data modifications
      id: git-check
      run: |
        git diff --exit-code src/data/videos.json || echo "changes_detected=true" >> $GITHUB_OUTPUT

    - name: Commit and Push new records
      if: steps.git-check.outputs.changes_detected == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add src/data/videos.json
        git commit -m "chore: automated monthly youtube video synchronization [skip ci]"
        git push